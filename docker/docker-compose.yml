version: "3.8"

services:

  coordinator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ./algoritmo_distribuido
    networks:
      - distnet

  worker1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ./algoritmo_distribuido worker
    depends_on:
      - coordinator
    networks:
      - distnet

  worker2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ./algoritmo_distribuido worker
    depends_on:
      - coordinator
    networks:
      - distnet

  worker3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ./algoritmo_distribuido worker
    depends_on:
      - coordinator
    networks:
      - distnet

  worker4:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ./algoritmo_distribuido worker
    depends_on:
      - coordinator
    networks:
      - distnet

networks:
  distnet:
    external: true
